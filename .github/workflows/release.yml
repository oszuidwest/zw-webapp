---
name: Release

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Release even if the version was not bumped'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  release:
    uses: oszuidwest/.github-templates/.github/workflows/wp-release.yml@v2
    with:
      force: ${{ inputs.force }}
    permissions:
      contents: write
